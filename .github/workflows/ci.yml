name: CI

on:
  push:
    tags:
      - v*

jobs:
  build-python-wheels-rocm:
    name: Build ROCm wheels (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025]
        python-version: [cp39-*, cp310-*, cp311-*, cp312-*, cp313-*]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ matrix.os }}-${{ matrix.python-version }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.python-version }}-
            ccache-${{ matrix.os }}-

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: deps-cache
          key: deps-${{ matrix.os }}-${{ github.sha }}
          restore-keys: |
            deps-${{ matrix.os }}-

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        with:
          package-dir: python
          output-dir: python/wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.python-version }}
          CIBW_ENVIRONMENT_LINUX: >
            ROCM_PATH=/opt/rocm 
            LD_LIBRARY_PATH=/opt/rocm/lib/llvm/lib:/github/workspace/deps-cache/lib:$LD_LIBRARY_PATH 
            CCACHE_DIR=/github/workspace/.ccache
            DEPS_INSTALL_DIR=/github/workspace/deps-cache
            CMAKE_PREFIX_PATH=/github/workspace/deps-cache
          CIBW_ENVIRONMENT_WINDOWS: >
            CTRANSLATE2_ROOT='${{ github.workspace }}\install'
            CCACHE_DIR='${{ github.workspace }}\.ccache'
            DEPS_INSTALL_DIR='${{ github.workspace }}\deps-cache'
          CIBW_BEFORE_ALL_LINUX: python/tools/prepare_build_environment_linux_rocm.sh
          CIBW_BEFORE_ALL_WINDOWS: bash python/tools/prepare_build_environment_windows_rocm.sh
          CIBW_BEFORE_BUILD: pip install -r python/install_requirements.txt
          CIBW_ARCHS: auto64
          CIBW_SKIP: "*-musllinux_*"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: 'auditwheel repair -w {dest_dir} --exclude "/opt/rocm/lib/lib*" {wheel}'

      - name: Upload Python wheels
        uses: actions/upload-artifact@v6
        with:
          name: rocm-python-wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: python/wheelhouse

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-python-wheels-rocm]
    permissions:
      contents: write
    steps:
      - name: Download ROCm wheels
        uses: actions/download-artifact@v6
        with:
          pattern: rocm-python-wheels-*
          merge-multiple: true
          path: release-artifacts

      - name: Generate Release Body
        id: generate_body
        run: |
          echo "## ROCm Release Manifest" > release_body.md
          echo "" >> release_body.md
          
          echo "### 🐧 Linux (Ubuntu 24.04)" >> release_body.md
          ls release-artifacts/*manylinux*.whl | sort -V | while read -r file; do
            filename=$(basename "$file")
            echo "- $filename" >> release_body.md
          done
          
          echo "" >> release_body.md
          echo "### 🪟 Windows (Server 2025)" >> release_body.md
          ls release-artifacts/*win_amd64*.whl | sort -V | while read -r file; do
            filename=$(basename "$file")
            echo "- $filename" >> release_body.md
          done
          
          # Escaping for GHA output
          body=$(cat release_body.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.generate_body.outputs.body }}
          files: release-artifacts/*.whl
